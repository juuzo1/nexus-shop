<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Nexus.Market</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root {
    /* Dark navy palette */
    --bg-base: #070B14;
    --bg-surface: #0D1320;
    --bg-elevated: #111827;
    --bg-card: #131B2D;
    --bg-input: #0A0F1C;

    /* Borders */
    --border-subtle: #1F2937;
    --border-default: #1F2A3F;
    --border-hover: #2D3B57;

    /* Text */
    --text-primary: #F8FAFC;
    --text-secondary: #CBD5E1;
    --text-muted: #9CA3AF;
    --text-faint: #64748B;

    /* Accents */
    --accent-blue: #3AABFF;
    --accent-blue-deep: #3A7BD5;
    --accent-blue-glow: rgba(58, 171, 255, 0.35);

    /* Gradients */
    --gradient-primary: linear-gradient(90deg, #3A7BD5 0%, #3AABFF 100%);
    --gradient-primary-hover: linear-gradient(90deg, #4189E8 0%, #4FBAFF 100%);

    --font-mono: 'Space Grotesk', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow-x: hidden;
  }
  /* Atmospheric background like main site */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 700px 500px at 20% 0%, rgba(58, 171, 255, 0.08), transparent 70%),
      radial-gradient(ellipse 600px 400px at 80% 100%, rgba(58, 123, 213, 0.06), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body > * { position: relative; z-index: 1; }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* ===== Top bar (slim) ===== */
  .topbar {
    height: 64px;
    border-bottom: 1px solid var(--border-subtle);
    background: rgba(7, 11, 20, 0.75);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
  }
  .topbar-inner {
    max-width: 1400px;
    height: 100%;
    margin: 0 auto;
    padding: 0 32px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
  }
  .secure-login {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
  }
  .secure-login svg { width: 14px; height: 14px; color: var(--accent-blue); }

  .logo-link {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    transition: opacity 0.18s;
  }
  .logo-link:hover { opacity: 0.85; }
  .logo-mark {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--gradient-primary);
    display: grid;
    place-items: center;
    color: white;
    box-shadow: 0 0 16px rgba(58, 171, 255, 0.3);
  }
  .logo-mark svg { width: 18px; height: 18px; }

  .topbar-right {
    display: flex;
    justify-content: flex-end;
  }

  /* Reuse the same lang-switch dropdown shape as the main site */
  .lang-switch-wrap { position: relative; }
  .lang-switch {
    height: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    border-radius: 10px;
    padding: 0 16px;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    font-family: inherit;
    letter-spacing: 0.02em;
  }
  .lang-switch:hover { border-color: var(--accent-blue); color: var(--text-primary); }
  .lang-switch .sep { width: 1px; height: 12px; background: var(--border-hover); }
  .lang-switch-wrap.open .lang-switch {
    border-color: var(--accent-blue);
    color: var(--text-primary);
    background: rgba(58, 171, 255, 0.06);
  }

  .lang-panel {
    position: absolute;
    top: calc(100% + 8px); right: 0;
    width: 320px;
    background: var(--bg-card);
    border: 1px solid var(--border-default);
    border-radius: 12px;
    padding: 18px;
    z-index: 200;
    opacity: 0; visibility: hidden;
    transform: translateY(-6px);
    transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
    box-shadow:
      0 0 0 1px rgba(58, 171, 255, 0.08),
      0 12px 40px rgba(0, 0, 0, 0.5),
      0 0 24px rgba(58, 171, 255, 0.12);
  }
  .lang-switch-wrap.open .lang-panel { opacity: 1; visibility: visible; transform: translateY(0); }
  .lang-panel-section { margin-bottom: 16px; }
  .lang-panel-section:last-of-type { margin-bottom: 18px; }
  .lang-panel-label {
    display: block;
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    color: var(--text-muted); text-transform: uppercase;
    margin-bottom: 8px;
  }
  .lang-select {
    position: relative;
    height: 44px;
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.18s, background 0.18s;
  }
  .lang-select:hover { border-color: var(--accent-blue); }
  .lang-select.open { border-color: var(--accent-blue); background: rgba(58, 171, 255, 0.04); }
  .lang-select-current {
    height: 100%;
    display: flex; align-items: center; gap: 10px;
    padding: 0 14px;
    color: var(--text-primary);
    font-size: 13.5px; font-weight: 500;
  }
  .lang-select-current .flag { font-size: 18px; line-height: 1; flex-shrink: 0; }
  .lang-select-current .lang-name { flex: 1; }
  .lang-select-current .chev {
    width: 14px; height: 14px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }
  .lang-select.open .chev { transform: rotate(180deg); color: var(--accent-blue); }
  .lang-options {
    position: absolute;
    top: calc(100% + 4px); left: 0; right: 0;
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    border-radius: 10px;
    padding: 6px;
    z-index: 10;
    max-height: 220px;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    display: none;
  }
  .lang-select.open .lang-options { display: block; }
  .lang-option {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 7px;
    color: var(--text-secondary);
    font-size: 13.5px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .lang-option:hover { background: rgba(58, 171, 255, 0.08); color: var(--text-primary); }
  .lang-option.selected { background: rgba(58, 171, 255, 0.12); color: var(--accent-blue); font-weight: 600; }
  .lang-option .flag { font-size: 17px; line-height: 1; }
  .lang-options::-webkit-scrollbar { width: 6px; }
  .lang-options::-webkit-scrollbar-track { background: transparent; }
  .lang-options::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
  .lang-accept {
    width: 100%;
    height: 42px;
    background: var(--gradient-primary);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: filter 0.18s, transform 0.1s;
  }
  .lang-accept:hover { filter: brightness(1.12); }
  .lang-accept:active { transform: scale(0.98); }

  /* ===== Main: centered card ===== */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }
  .login-card {
    width: 100%;
    max-width: 440px;
    background: var(--bg-card);
    border: 1px solid var(--border-default);
    border-radius: 16px;
    padding: 36px 36px 28px;
    box-shadow:
      0 0 0 1px rgba(58, 171, 255, 0.05),
      0 20px 60px rgba(0, 0, 0, 0.5),
      0 0 60px rgba(58, 171, 255, 0.06);
  }
  .login-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 24px;
    letter-spacing: -0.01em;
  }

  .field { margin-bottom: 16px; }
  .field-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .field-input-wrap { position: relative; }
  .field-input {
    width: 100%;
    height: 46px;
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 14px;
    padding: 0 16px;
    transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
    outline: none;
  }
  .field-input:focus {
    border-color: var(--accent-blue);
    background: rgba(58, 171, 255, 0.04);
    box-shadow: 0 0 0 4px rgba(58, 171, 255, 0.12);
  }
  .field-input::placeholder { color: var(--text-faint); }

  .show-password {
    position: absolute;
    top: 50%;
    right: 14px;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--accent-blue);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    transition: filter 0.15s;
  }
  .show-password:hover { filter: brightness(1.15); text-decoration: underline; }
  .field-input[type="password"] { padding-right: 60px; }
  .field-input[type="text"].pw { padding-right: 60px; }

  .forgot-link {
    display: block;
    text-align: right;
    margin: 4px 0 22px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-blue);
    transition: filter 0.15s;
  }
  .forgot-link:hover { filter: brightness(1.15); text-decoration: underline; }

  .btn-signin {
    width: 100%;
    height: 48px;
    background: var(--gradient-primary);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: filter 0.18s, transform 0.1s, box-shadow 0.18s;
    box-shadow: 0 4px 16px rgba(58, 171, 255, 0.25);
  }
  .btn-signin:hover { filter: brightness(1.12); box-shadow: 0 4px 24px rgba(58, 171, 255, 0.35); }
  .btn-signin:active { transform: scale(0.99); }

  .or-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0 18px;
    color: var(--text-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .or-divider::before, .or-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-default);
  }

  .oauth-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  .oauth-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    height: 46px;
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.1s;
  }
  .oauth-btn:hover {
    background: rgba(58, 171, 255, 0.05);
    border-color: var(--accent-blue);
  }
  .oauth-btn:active { transform: scale(0.98); }
  .oauth-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

  .signup-footer {
    text-align: center;
    font-size: 13.5px;
    color: var(--text-secondary);
    padding-top: 18px;
    border-top: 1px solid var(--border-default);
  }
  .signup-footer .create-link {
    color: var(--accent-blue);
    font-weight: 700;
    margin-left: 6px;
    transition: filter 0.15s;
  }
  .signup-footer .create-link:hover { filter: brightness(1.2); text-decoration: underline; }

  /* ===== Footer ===== */
  footer {
    border-top: 1px solid var(--border-subtle);
    padding: 22px 32px;
    background: rgba(7, 11, 20, 0.5);
  }
  .footer-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    color: var(--text-muted);
    font-size: 13px;
  }
  .footer-links { display: flex; gap: 28px; }
  .footer-links a { transition: color 0.15s; }
  .footer-links a:hover { color: var(--text-primary); }


  /* === Auth banner === */
  .auth-banner {
    display: none;
    margin-bottom: 14px;
    padding: 11px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.4;
  }
  .auth-banner.error {
    display: block;
    background: rgba(220, 38, 38, 0.1);
    border: 1px solid rgba(220, 38, 38, 0.4);
    color: #f87171;
  }
  .auth-banner.success {
    display: block;
    background: rgba(16, 185, 129, 0.08);
    border: 1px solid rgba(16, 185, 129, 0.4);
    color: #34d399;
  }
  .field-error {
    display: none;
    color: #f87171;
    font-size: 12px;
    margin-top: 6px;
  }
  .field-error.show { display: block; }
  .field-input.invalid { border-color: rgba(220, 38, 38, 0.6); }
  .btn-signin:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    .topbar-inner { padding: 0 16px; gap: 12px; }
    .secure-login span { display: none; }
    .login-card { padding: 28px 22px 22px; }
    .oauth-grid { grid-template-columns: 1fr; }
    .footer-inner { justify-content: center; text-align: center; }
    .footer-links { gap: 18px; }
  }
</style>
</head>
<body>

<!-- Top bar -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="secure-login">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>Secure login</span>
    </div>

    <a class="logo-link" href="index.html" id="site-logo-link">
      <div class="logo-mark">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6l-8-4Z"/></svg>
      </div>
      <span id="site-logo-text">Nexus.<span style="color: var(--accent-blue);">S</span>hop</span>
    </a>

    <div class="topbar-right">
      <div class="lang-switch-wrap" id="lang-wrap">
        <button class="lang-switch" id="lang-trigger" aria-haspopup="true" aria-expanded="false">
          <span id="lang-trigger-lang">EN</span>
          <span class="sep"></span>
          <span id="lang-trigger-cur">USD</span>
        </button>
        <div class="lang-panel" id="lang-panel" role="dialog">
          <div class="lang-panel-section">
            <span class="lang-panel-label">Languages</span>
            <div class="lang-select" id="lang-select-language">
              <div class="lang-select-current">
                <span class="flag" id="lang-cur-flag">🇬🇧</span>
                <span class="lang-name" id="lang-cur-name">English</span>
                <svg class="chev" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
              </div>
              <div class="lang-options" id="lang-options-language"></div>
            </div>
          </div>
          <div class="lang-panel-section">
            <span class="lang-panel-label">Currencies</span>
            <div class="lang-select" id="lang-select-currency">
              <div class="lang-select-current">
                <span class="lang-name" id="cur-cur-name">USD</span>
                <svg class="chev" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
              </div>
              <div class="lang-options" id="lang-options-currency"></div>
            </div>
          </div>
          <button class="lang-accept" id="lang-accept">ACCEPT</button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Centered login card -->
<main>
  <div class="login-card">
    <h1 class="login-title">Sign in</h1>

    <div class="auth-banner" id="auth-banner"></div>
    <form id="login-form" autocomplete="off" novalidate>
      <div class="field">
        <label class="field-label" for="email">Email</label>
        <div class="field-input-wrap">
          <input class="field-input" id="email" type="email" autocomplete="email" required />
        </div>
        <div class="field-error" id="email-error">Please enter a valid email address.</div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="field-input-wrap">
          <input class="field-input pw" id="password" type="password" autocomplete="current-password" required />
          <button class="show-password" id="toggle-pw" type="button">Show</button>
        </div>
      </div>

      <a class="forgot-link" href="#">Forgot password?</a>

      <button class="btn-signin" type="submit">Sign in</button>
    </form>

    <div class="or-divider">or sign in with</div>

    <div class="oauth-grid">
      <button class="oauth-btn" type="button" data-provider="google">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        Google
      </button>
      <button class="oauth-btn" type="button" data-provider="x">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#fff"/><path fill="#000" d="M16.245 5.5h2.453l-5.36 6.125 6.305 8.335h-4.937L11 14.85l-4.443 5.11H4.103l5.733-6.553L3.792 5.5h5.063l3.5 4.628L16.245 5.5zm-.86 13.07h1.36L8.18 6.92H6.72l8.665 11.65z"/></svg>
        X
      </button>
      <button class="oauth-btn" type="button" data-provider="steam">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#fff"><path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.063 0 .125.004.188.006l2.861-4.142V8.91c0-2.495 2.028-4.524 4.524-4.524 2.494 0 4.524 2.031 4.524 4.527s-2.03 4.525-4.524 4.525h-.105l-4.076 2.911c0 .052.004.105.004.159 0 1.875-1.515 3.396-3.39 3.396-1.635 0-3.016-1.173-3.331-2.727L.436 15.27C1.862 20.307 6.486 24 11.979 24c6.624 0 11.999-5.372 11.999-12S18.603 0 11.979 0zM7.54 18.21l-1.473-.61c.262.543.714.999 1.314 1.25 1.297.539 2.793-.076 3.332-1.375.263-.63.264-1.319.005-1.949s-.75-1.121-1.377-1.383c-.624-.26-1.29-.249-1.878-.03l1.523.63c.956.4 1.409 1.5 1.009 2.455-.397.957-1.497 1.41-2.454 1.012H7.54zm11.415-9.303c0-1.662-1.353-3.015-3.015-3.015-1.665 0-3.015 1.353-3.015 3.015 0 1.665 1.35 3.015 3.015 3.015 1.663 0 3.015-1.35 3.015-3.015zm-5.273-.005c0-1.252 1.013-2.266 2.265-2.266 1.249 0 2.266 1.014 2.266 2.266 0 1.251-1.017 2.265-2.266 2.265-1.253 0-2.265-1.014-2.265-2.265z"/></svg>
        Steam
      </button>
    </div>

<!-- Supabase + data.js (so logo can sync from DB later if you want) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data.js"></script>

<script>
/* ============================================================
   Logo: try to read from SITE_DATA when ready (keeps consistency
   with the rest of the site if the admin renames the brand).
   Falls back to the hard-coded "Nexus.Market" already in the DOM.
   ============================================================ */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
if (window.SITE_DATA_READY) {
  SITE_DATA_READY.then(d => {
    try {
      const t = d.logo.text;
      const idx = d.logo.accent_index;
      document.getElementById('site-logo-text').innerHTML =
        esc(t.slice(0, idx)) +
        '<span style="color: var(--accent-blue);">' + esc(t.slice(idx, idx + 1)) + '</span>' +
        esc(t.slice(idx + 1));
    } catch (e) { /* keep fallback */ }
  });
}

/* ============================================================
   Show/hide password
   ============================================================ */
(function() {
  const btn = document.getElementById('toggle-pw');
  const pw  = document.getElementById('password');
  btn.addEventListener('click', () => {
    if (pw.type === 'password') { pw.type = 'text'; btn.textContent = 'Hide'; }
    else { pw.type = 'password'; btn.textContent = 'Show'; }
  });
})();

/* ============================================================
   Form submit + OAuth — placeholders for now (no backend wired).
   ============================================================ */
(function() {
  const form = document.getElementById('login-form');
  const emailEl = document.getElementById('email');
  const pwEl    = document.getElementById('password');
  const banner  = document.getElementById('auth-banner');
  const emailErr = document.getElementById('email-error');
  const submitBtn = form.querySelector('.btn-signin');

  function isValidEmail(s) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s); }

  function showError(msg) {
    banner.className = 'auth-banner error';
    banner.textContent = msg;
  }
  function showSuccess(msg) {
    banner.className = 'auth-banner success';
    banner.textContent = msg;
  }
  function clearBanner() { banner.className = 'auth-banner'; banner.textContent = ''; }

  emailEl.addEventListener('blur', () => {
    if (emailEl.value && !isValidEmail(emailEl.value.trim())) {
      emailErr.classList.add('show');
      emailEl.classList.add('invalid');
    } else {
      emailErr.classList.remove('show');
      emailEl.classList.remove('invalid');
    }
  });
  emailEl.addEventListener('input', () => {
    if (emailEl.classList.contains('invalid') && isValidEmail(emailEl.value.trim())) {
      emailErr.classList.remove('show');
      emailEl.classList.remove('invalid');
    }
  });

  form.addEventListener('submit', async e => {
    e.preventDefault();
    clearBanner();
    const email = emailEl.value.trim();
    const pw    = pwEl.value;

    if (!email || !isValidEmail(email)) {
      emailErr.classList.add('show');
      emailEl.classList.add('invalid');
      emailEl.focus();
      return;
    }
    if (!pw) { pwEl.focus(); return; }

    const sb = window.sb;
    if (!sb) { showError('Connection not ready, please try again in a moment.'); return; }

    submitBtn.disabled = true;
    const oldText = submitBtn.textContent;
    submitBtn.textContent = 'Signing in...';

    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
      if (error) {
        if (/invalid\s+login|invalid\s+credentials/i.test(error.message)) {
          showError('Invalid email or password.');
        } else if (/email\s+not\s+confirmed/i.test(error.message)) {
          showError('Please confirm your email before signing in.');
        } else {
          showError(error.message || 'Sign in failed. Please try again.');
        }
        submitBtn.disabled = false;
        submitBtn.textContent = oldText;
        return;
      }
      showSuccess('Welcome back! Redirecting...');
      setTimeout(() => { window.location.href = 'index.html'; }, 600);
    } catch (err) {
      console.error('[login]', err);
      showError('Network error. Please try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = oldText;
    }
  });

  document.querySelectorAll('.oauth-btn').forEach(b => {
    b.addEventListener('click', () => {
      showError('OAuth providers (' + b.dataset.provider + ') not yet enabled.');
    });
  });
})();

/* ============================================================
   Languages & Currencies dropdown — same logic as the main site,
   reads/writes localStorage keys nx_lang + nx_cur.
   ============================================================ */
(function() {
  const LANGS = [
    { code: 'EN', name: 'English',  flag: '🇬🇧' },
    { code: 'DE', name: 'Deutsch',  flag: '🇩🇪' },
    { code: 'ES', name: 'Español',  flag: '🇪🇸' },
    { code: 'FR', name: 'Français', flag: '🇫🇷' },
    { code: 'IT', name: 'Italiano', flag: '🇮🇹' },
    { code: 'PL', name: 'Polski',   flag: '🇵🇱' },
    { code: 'RO', name: 'Română',   flag: '🇷🇴' }
  ];
  const CURS = [
    { code: 'USD' }, { code: 'EUR' }, { code: 'GBP' }, { code: 'CHF' },
    { code: 'SEK' }, { code: 'NOK' }, { code: 'DKK' }, { code: 'PLN' }
  ];

  const wrap     = document.getElementById('lang-wrap');
  const trigger  = document.getElementById('lang-trigger');
  const panel    = document.getElementById('lang-panel');
  const trigLang = document.getElementById('lang-trigger-lang');
  const trigCur  = document.getElementById('lang-trigger-cur');
  const langSel  = document.getElementById('lang-select-language');
  const curSel   = document.getElementById('lang-select-currency');
  const langOpts = document.getElementById('lang-options-language');
  const curOpts  = document.getElementById('lang-options-currency');
  const langCurFlag = document.getElementById('lang-cur-flag');
  const langCurName = document.getElementById('lang-cur-name');
  const curCurName  = document.getElementById('cur-cur-name');
  const acceptBtn   = document.getElementById('lang-accept');

  function getSaved() {
    let lang = LANGS[0], cur = CURS[0];
    try {
      const lc = localStorage.getItem('nx_lang');
      const cc = localStorage.getItem('nx_cur');
      const fl = LANGS.find(x => x.code === lc); if (fl) lang = fl;
      const fc = CURS.find(x => x.code === cc);  if (fc) cur = fc;
    } catch (e) {}
    return { lang, cur };
  }
  let { lang: selLang, cur: selCur } = getSaved();
  let pendLang = selLang, pendCur = selCur;

  function applyTrigger() {
    trigLang.textContent = selLang.code;
    trigCur.textContent  = selCur.code;
  }
  function paintPanel() {
    langCurFlag.textContent = pendLang.flag;
    langCurName.textContent = pendLang.name;
    curCurName.textContent  = pendCur.code;
    langOpts.innerHTML = LANGS.map(l =>
      `<div class="lang-option${l.code === pendLang.code ? ' selected' : ''}" data-code="${l.code}">
         <span class="flag">${l.flag}</span><span>${l.name}</span>
       </div>`).join('');
    curOpts.innerHTML = CURS.map(c =>
      `<div class="lang-option${c.code === pendCur.code ? ' selected' : ''}" data-code="${c.code}">
         <span>${c.code}</span>
       </div>`).join('');
  }
  applyTrigger(); paintPanel();

  function openPanel()  { pendLang = selLang; pendCur = selCur; paintPanel(); wrap.classList.add('open');    trigger.setAttribute('aria-expanded','true'); }
  function closePanel() { wrap.classList.remove('open'); langSel.classList.remove('open'); curSel.classList.remove('open'); trigger.setAttribute('aria-expanded','false'); }

  trigger.addEventListener('click', e => { e.stopPropagation();
    wrap.classList.contains('open') ? closePanel() : openPanel();
  });
  langSel.querySelector('.lang-select-current').addEventListener('click', e => { e.stopPropagation();
    curSel.classList.remove('open'); langSel.classList.toggle('open');
  });
  curSel.querySelector('.lang-select-current').addEventListener('click', e => { e.stopPropagation();
    langSel.classList.remove('open'); curSel.classList.toggle('open');
  });
  langOpts.addEventListener('click', e => {
    const opt = e.target.closest('.lang-option'); if (!opt) return;
    e.stopPropagation();
    const f = LANGS.find(x => x.code === opt.dataset.code);
    if (f) { pendLang = f; paintPanel(); }
    langSel.classList.remove('open');
  });
  curOpts.addEventListener('click', e => {
    const opt = e.target.closest('.lang-option'); if (!opt) return;
    e.stopPropagation();
    const f = CURS.find(x => x.code === opt.dataset.code);
    if (f) { pendCur = f; paintPanel(); }
    curSel.classList.remove('open');
  });
  acceptBtn.addEventListener('click', e => {
    e.stopPropagation();
    selLang = pendLang; selCur = pendCur;
    try {
      localStorage.setItem('nx_lang', selLang.code);
      localStorage.setItem('nx_cur',  selCur.code);
    } catch (e) {}
    applyTrigger(); closePanel();
  });
  document.addEventListener('click', e => { if (!wrap.contains(e.target)) closePanel(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
})();
</script>

</body>
